<!DOCTYPE html>
<html>
<head>
    <title>FileBay 连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>FileBay 连接测试</h1>
    
    <div class="test-section">
        <h2>1. 读取 FileBay 配置</h2>
        <button onclick="testReadConfig()">读取配置</button>
        <div id="config-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 测试 Vault API</h2>
        <button onclick="testVaultAPI()">测试 Vault API</button>
        <div id="vault-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 测试 FileBay 连接</h2>
        <button onclick="testFileBayConnection()">测试连接</button>
        <div id="filebay-result"></div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        async function testReadConfig() {
            const resultDiv = document.getElementById('config-result');
            resultDiv.innerHTML = '<p class="info">正在读取配置...</p>';
            
            try {
                const result = await invoke('read_filebay_config');
                console.log('Config result:', result);
                
                if (result.exists && result.config) {
                    resultDiv.innerHTML = `
                        <p class="success">✓ 配置文件存在</p>
                        <pre>${JSON.stringify(result.config, null, 2)}</pre>
                        <p>文件路径: ${result.file_path}</p>
                        <p>最后修改: ${result.last_modified}</p>
                    `;
                } else {
                    resultDiv.innerHTML = '<p class="error">✗ 配置文件不存在</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ 错误: ${error}</p>`;
            }
        }

        async function testVaultAPI() {
            const resultDiv = document.getElementById('vault-result');
            resultDiv.innerHTML = '<p class="info">正在测试 Vault API...</p>';
            
            try {
                // 测试健康检查
                const healthResponse = await fetch('http://localhost:7788/api/v1/health');
                const healthData = await healthResponse.json();
                
                // 测试获取配置
                const configResponse = await fetch('http://localhost:7788/api/v1/filebay/config');
                const configData = await configResponse.json();
                
                resultDiv.innerHTML = `
                    <p class="success">✓ Vault API 运行正常</p>
                    <h4>健康检查:</h4>
                    <pre>${JSON.stringify(healthData, null, 2)}</pre>
                    <h4>FileBay 配置:</h4>
                    <pre>${JSON.stringify(configData, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ 错误: ${error.message}</p>`;
            }
        }

        async function testFileBayConnection() {
            const resultDiv = document.getElementById('filebay-result');
            resultDiv.innerHTML = '<p class="info">正在测试 FileBay 连接...</p>';
            
            try {
                // 先获取配置
                const configResponse = await fetch('http://localhost:7788/api/v1/filebay/config');
                const configData = await configResponse.json();
                
                if (!configData.success || !configData.data) {
                    resultDiv.innerHTML = '<p class="error">✗ 未找到 FileBay 配置</p>';
                    return;
                }
                
                const config = configData.data;
                const baseUrl = config.url;
                const token = config.token;
                
                resultDiv.innerHTML += `<p class="info">正在连接到: ${baseUrl}</p>`;
                
                // 测试 API 版本
                try {
                    const versionResponse = await fetch(`${baseUrl}/api/v1/version`, {
                        headers: {
                            'Authorization': `token ${token}`
                        }
                    });
                    
                    if (versionResponse.ok) {
                        const versionData = await versionResponse.json();
                        resultDiv.innerHTML += `
                            <p class="success">✓ FileBay 服务器连接成功</p>
                            <pre>${JSON.stringify(versionData, null, 2)}</pre>
                        `;
                    } else {
                        resultDiv.innerHTML += `<p class="error">✗ 服务器响应错误: ${versionResponse.status}</p>`;
                    }
                } catch (fetchError) {
                    resultDiv.innerHTML += `<p class="error">✗ 连接失败: ${fetchError.message}</p>`;
                    resultDiv.innerHTML += `<p class="info">注意: 这可能是 CORS 或 SSL 证书问题</p>`;
                }
                
                // 测试用户信息
                try {
                    const userResponse = await fetch(`${baseUrl}/api/v1/user`, {
                        headers: {
                            'Authorization': `token ${token}`
                        }
                    });
                    
                    if (userResponse.ok) {
                        const userData = await userResponse.json();
                        resultDiv.innerHTML += `
                            <p class="success">✓ Token 验证成功</p>
                            <p>用户: ${userData.login} (${userData.full_name})</p>
                        `;
                    }
                } catch (error) {
                    // 忽略错误，可能是 CORS
                }
                
            } catch (error) {
                resultDiv.innerHTML += `<p class="error">✗ 测试失败: ${error.message}</p>`;
            }
        }

        // 页面加载时自动运行测试
        window.addEventListener('DOMContentLoaded', () => {
            console.log('FileBay 测试页面已加载');
        });
    </script>
</body>
</html>
